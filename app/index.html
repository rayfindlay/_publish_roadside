<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Norfab, Fleet Compliance</title>
<link rel="stylesheet" href="norfab.css">
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--fg); font-family: var(--font-sans); }
  #root { height: 100%; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: var(--steel-200); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: var(--steel-300); }
  *::-webkit-scrollbar-track { background: transparent; }
  button { font-family: inherit; }
  *::-webkit-scrollbar-track { background: transparent; }
  button { font-family: inherit; }

  /* ===== Feature #6: tabular numerals + hairline column rules ===== */
  /* Numbers in tables, stat values, and mono spans must align, premium signal. */
  table, .nf-stat-value, .nf-mono, td, th { font-variant-numeric: tabular-nums; }
  table { border-collapse: collapse; }
  table thead th { font-variant-numeric: tabular-nums; }
  table tbody td + td, table thead th + th { border-left: 1px solid rgba(17,36,54,0.04); }
  table tbody tr:hover { background: var(--steel-50); }

  /* ===== Polish motion (conservative, audit-software tone) ===== */
  @keyframes nf-route-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes nf-toast-in {
    from { opacity: 0; transform: translate(-50%, 14px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes nf-cell-in {
    from { opacity: 0; transform: translateY(4px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes nf-section-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .nf-route        { animation: nf-route-in 220ms cubic-bezier(0.2,0.7,0.2,1) both; }
  .nf-toast        { animation: nf-toast-in 200ms cubic-bezier(0.2,0.7,0.2,1) both; }
  .nf-cell         { animation: nf-cell-in 240ms cubic-bezier(0.2,0.7,0.2,1) both; }
  .nf-section      { animation: nf-section-in 260ms cubic-bezier(0.2,0.7,0.2,1) both; }

  .nf-card {
    transition: transform 160ms cubic-bezier(0.2,0.7,0.2,1),
                box-shadow 160ms cubic-bezier(0.2,0.7,0.2,1),
                border-color 160ms cubic-bezier(0.2,0.7,0.2,1);
    will-change: transform;
  }
  .nf-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(17,36,54,0.10);
  }

  /* Hover on month calendar day cells (driver detail) */
  .nf-day-cell { transition: transform 140ms cubic-bezier(0.2,0.7,0.2,1), box-shadow 140ms cubic-bezier(0.2,0.7,0.2,1), border-color 140ms cubic-bezier(0.2,0.7,0.2,1); }
  .nf-day-cell:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(17,36,54,0.10); }

  /* Hover on the 7-day strip bars in the fleet overview driver cards.
     The original design declared the transition on the cell inline and listed
     this selector in the reduced-motion override, but never wrote the active
     :hover rule, adding it here so the lift actually triggers. */
  .day-strip-cell:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(17,36,54,0.18); }

  @media (prefers-reduced-motion: reduce) {
    .nf-route, .nf-toast, .nf-cell, .nf-section { animation: none !important; }
    .nf-card, .nf-card:hover, .nf-day-cell, .nf-day-cell:hover, .day-strip-cell, .day-strip-cell:hover {
      transition: none !important; transform: none !important;
    }
  }

  @media print {
    body * { visibility: hidden !important; }
    .audit-page, .audit-page *,
    .nf-binder, .nf-binder * { visibility: visible !important; }
    .audit-page { position: absolute; left: 0; top: 0; box-shadow: none !important; margin: 0 !important; }
    .no-print, .nf-no-print { display: none !important; }
    @page { size: letter; margin: 0.5in; }
    /* Feature #8: print-binder layout for driver-month export */
    .nf-binder { position: absolute; left: 0; top: 0; width: 100%; background: #fff; color: #112436; font-family: var(--font-sans); }
    .nf-binder-page { page-break-after: always; padding: 8mm 6mm; }
    .nf-binder-page:last-child { page-break-after: auto; }
    .nf-binder svg { max-width: 100%; height: auto; }
  }
  @keyframes nf-stat-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .nf-stat-value { animation: nf-stat-in 360ms cubic-bezier(0.2,0.7,0.2,1) both; }

  /* Duty-chart segment reveal + hover.
     SVG <line> needs transform-box: fill-box for the transform-origin to work cross-browser.
     Hover grows the bar vertically from its track center + tints a halo in its own color
     so the segment stays in its row (doesn't jump). */
  @keyframes nf-duty-in {
    from { opacity: 0; transform: scaleX(0.6); }
    to   { opacity: 1; transform: scaleX(1); }
  }
  .nf-duty-seg {
    transform-box: fill-box;
    transform-origin: center center;
    animation: nf-duty-in 520ms cubic-bezier(0.2,0.7,0.2,1) both;
    transition: transform 180ms cubic-bezier(0.2,0.7,0.2,1), filter 180ms cubic-bezier(0.2,0.7,0.2,1);
  }
  .nf-duty-seg.driving:hover {
    transform: scaleY(1.65);
    filter: drop-shadow(0 0 4px rgba(217,80,31,0.55));
  }
  .nf-duty-seg.other:hover {
    transform: scaleY(1.65);
    filter: drop-shadow(0 0 3px rgba(17,36,54,0.35));
  }

  @media (prefers-reduced-motion: reduce) {
    .nf-stat-value, .nf-duty-seg { animation: none !important; }
    .nf-duty-seg:hover { transform: none !important; filter: none !important; }
  }
</style>
</head>
